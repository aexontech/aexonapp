kind = "web"
previewPath = "/"
title = "Aexon Endoscopy"
version = "1.0.0"
id = "artifacts/aexon"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 19052
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/aexon run dev"

[services.env]
PORT = "19052"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/aexon", "run", "build"]
publicDir = "artifacts/aexon/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
